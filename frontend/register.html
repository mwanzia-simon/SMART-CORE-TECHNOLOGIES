<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartCore | Technologies</title>
    <link rel="stylesheet" href="CSS/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon" />
  </head>
  <body>
    <style>
      body {
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>

    <!-- Register form -->
    <form class="register-form">
      <h3>Register</h3>
      <hr />
      <div class="form-container">
        <div class="inputs">
          <label for="register-username">Full name</label>
          <input
            type="text"
            id="register-username"
            placeholder="Enter your full name ... "
            required
          />
        </div>
        <div class="inputs">
          <label for="register-email">Email</label>
          <input
            type="email"
            id="register-email"
            placeholder="Enter email ... "
            required
          />
        </div>
        <div class="inputs">
          <label for="register-password">Password</label>
          <input
            type="password"
            id="register-password"
            placeholder="Enter password ... "
            required
          />
        </div>
      </div>
      <div class="space"></div>
      <a href="login.html">Already have an account.</a>
      <br />
      <button type="submit" id="registerButton">Register</button>
    </form>
    <script>
      const form = document.querySelector(".register-form");
      const username = document.querySelector("#register-username");
      const email = document.querySelector("#register-email");
      const password = document.querySelector("#register-password");
      const API = "http://localhost:5050/api/v1/user/register";

      // Handling form submission
      form.addEventListener("submit", (e) => {
        e.preventDefault();

        if (
          !username.value.trim() ||
          !email.value.trim() ||
          !password.value.trim()
        ) {
          alert("Please enter all the fields!");
          return;
        }

        let userObj = {
          username: username.value,
          email: email.value,
          password: password.value,
        };

        // An asychronous function to register the user
        registerUser(userObj);
      });

      async function registerUser(userObj) {
        try {
          const res = await fetch(API, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(userObj),
          });

          const data = await res.json();
          alert(data.message);
          if (res.status !== 201) return;
          clearFields();
          window.location.href = "login.html";
        } catch (error) {
          console.log(error);
          alert("Please try again later!");
        }
      }

      // A function to clear all fields
      function clearFields() {
        username.value = "";
        email.value = "";
        password.value = "";
      }
    </script>
  </body>
</html>
