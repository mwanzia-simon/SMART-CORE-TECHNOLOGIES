<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartCore | Technologies</title>
    <link rel="stylesheet" href="CSS/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon" />
  </head>
  <body>
    <style>
      body {
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
    <!-- creating an alert box -->
    <div class="alert">
      <i class="fa-solid fa-circle-info"></i>
      <div class="alert-info">
        <h3 id="alert-title"></h3>
        <p id="alert-message"></p>
      </div>
    </div>

    <!-- Login form -->
    <form class="login-form">
      <h3>Login</h3>
      <hr />
      <div class="form-container">
        <div class="inputs">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter email ... "
            required
          />
        </div>
        <div class="inputs">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter password ... "
            required
          />
        </div>
      </div>
      <div class="space"></div>
      <a href="register.html">Don't have an account.</a>
      <br />
      <button type="submit" id="loginButton">Login</button>
    </form>

    <script>
      const emailInput = document.querySelector("#email");
      const passwordInput = document.querySelector("#password");
      const loginBtn = document.querySelector("#loginButton");
      const form = document.querySelector(".login-form");
      const API = "http://localhost:5050/api/v1/user/login";

      // Adding an even listener to the form for submit event
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (!emailInput.value.trim() || !passwordInput.value.trim()) {
          alert("Please enter all the fields!");
          return;
        }

        const userObj = {
          email: emailInput.value,
          password: passwordInput.value,
        };

        // A function to login the user
        loginUser(userObj);
      });

      async function loginUser(userObj) {
        try {
          const res = await fetch(API, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(userObj),
          });

          const data = await res.json();
          displayAlert("LOGIN ALERT", data.message);
          if (res.status !== 200) return;

          // Here we save the login data clear the fields and redirect the user to the homepage
          saveloginData(data.data);
          clearFields();
          setTimeout(() => {
            window.location.href = "index.html";
          }, 2500);
        } catch (error) {
          console.log(error);
          alert("An error occured!");
        }
      }

      // A fucntion to clear input fields
      function clearFields() {
        emailInput.value = "";
        passwordInput.value = "";
      }

      function saveloginData(data) {
        localStorage.setItem("logged_user", JSON.stringify(data));
      }

      // Function to display an alert box
      function displayAlert(title, message) {
        const alertBox = document.querySelector(".alert");
        const alertTitle = document.querySelector("#alert-title");
        const alertMessage = document.querySelector("#alert-message");
        alertTitle.textContent = title;
        alertMessage.textContent = message;
        alertBox.classList.add("active");
        setTimeout(() => {
          alertBox.classList.remove("active");
        }, 2000);
      }
    </script>
  </body>
</html>
